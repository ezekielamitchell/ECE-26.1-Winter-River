; PlatformIO Project Configuration File
; https://docs.platformio.org/page/projectconf.html
;
; Winter River 24-node topology (25 devices including shared server_rack)
; Side A (12 nodes) + Side B (12 nodes) + server_rack (2N shared)
;
; Flash a single node:  pio run -e utility_a --target upload
; Build all:            pio run

; ── SHARED BASE ──────────────────────────────────────────────────────────────
[env]
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino
monitor_speed = 115200
lib_deps =
    knolleary/PubSubClient@^2.8
    adafruit/Adafruit SSD1306@^2.5.7
    adafruit/Adafruit GFX Library@^1.11.5

; ── SIDE A ───────────────────────────────────────────────────────────────────
; Power chain (IT path):
;   utility_a → mv_switchgear_a → mv_lv_transformer_a
;   generator_a ↗ ats_a → lv_dist_a → ups_a → pdu_a → rectifier_a → server_rack
; Facility branches (off lv_dist_a):
;   cooling_a | lighting_a | monitoring_a

[env:utility_a]
build_src_filter = +<utility/utility_a/>

[env:mv_switchgear_a]
build_src_filter = +<mv_switchgear/mv_switchgear_a/>

[env:mv_lv_transformer_a]
build_src_filter = +<mv_lv_transformer/mv_lv_transformer_a/>

[env:generator_a]
build_src_filter = +<generator/generator_a/>

[env:ats_a]
build_src_filter = +<ats/ats_a/>

[env:lv_dist_a]
build_src_filter = +<lv_dist/lv_dist_a/>

[env:ups_a]
build_src_filter = +<ups/ups_a/>

[env:pdu_a]
build_src_filter = +<pdu/pdu_a/>

[env:rectifier_a]
build_src_filter = +<rectifier/rectifier_a/>

[env:cooling_a]
build_src_filter = +<cooling/cooling_a/>

[env:lighting_a]
build_src_filter = +<lighting/lighting_a/>

[env:monitoring_a]
build_src_filter = +<monitoring/monitoring_a/>

; ── SIDE B ───────────────────────────────────────────────────────────────────

[env:utility_b]
build_src_filter = +<utility/utility_b/>

[env:mv_switchgear_b]
build_src_filter = +<mv_switchgear/mv_switchgear_b/>

[env:mv_lv_transformer_b]
build_src_filter = +<mv_lv_transformer/mv_lv_transformer_b/>

[env:generator_b]
build_src_filter = +<generator/generator_b/>

[env:ats_b]
build_src_filter = +<ats/ats_b/>

[env:lv_dist_b]
build_src_filter = +<lv_dist/lv_dist_b/>

[env:ups_b]
build_src_filter = +<ups/ups_b/>

[env:pdu_b]
build_src_filter = +<pdu/pdu_b/>

[env:rectifier_b]
build_src_filter = +<rectifier/rectifier_b/>

[env:cooling_b]
build_src_filter = +<cooling/cooling_b/>

[env:lighting_b]
build_src_filter = +<lighting/lighting_b/>

[env:monitoring_b]
build_src_filter = +<monitoring/monitoring_b/>

; ── SHARED 2N NODE ───────────────────────────────────────────────────────────

[env:server_rack]
build_src_filter = +<server_rack/server_rack/>

; ── LEGACY (not in active chain) ─────────────────────────────────────────────
; Old node IDs kept for reference — do NOT flash to new hardware.

[env:util_a_legacy]
build_src_filter = +<utility/util_a/>

[env:transformer_a_legacy]
build_src_filter = +<transformer/transformer_a/>

[env:sw_a_legacy]
build_src_filter = +<switchgear/sw_a/>

[env:gen_a_legacy]
build_src_filter = +<generator/gen_a/>

[env:dist_a_legacy]
build_src_filter = +<distribution/dist_a/>

[env:srv_a_legacy]
build_src_filter = +<server_rack/srv_a/>

; pdu/pdu_b/ was overwritten with new full firmware for the 25-node topology.
; The old LiquidCrystal_I2C legacy pdu_b firmware no longer exists.
; Use [env:pdu_b] above to build the Side B PDU.
