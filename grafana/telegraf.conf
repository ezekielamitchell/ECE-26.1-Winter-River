# Telegraf Configuration — Native systemd install
# MQTT Consumer → InfluxDB v2 bridge for Winter River
#
# Credentials are injected at setup time via /etc/default/telegraf.
# Re-run scripts/setup_pi.sh to update them.
#
# Topic schema: winter-river/<node_id>/status  (JSON payload)

[global_tags]
  project = "winter-river"

[agent]
  interval = "10s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "0s"
  flush_interval = "10s"
  flush_jitter = "0s"
  precision = "0s"
  omit_hostname = false

# ── Output: InfluxDB v2 ───────────────────────────────────────────────────────
[[outputs.influxdb_v2]]
  urls = ["http://localhost:8086"]
  # Token is sourced from /etc/default/telegraf (set by scripts/setup_pi.sh)
  token = "${INFLUX_TOKEN}"
  organization = "iot-project"
  bucket = "mqtt_metrics"

# ── Input: MQTT Consumer ──────────────────────────────────────────────────────
[[inputs.mqtt_consumer]]
  servers = ["tcp://192.168.4.1:1883"]

  # Subscribe to all Winter River node status messages
  # Topic format: winter-river/<node_id>/status
  topics = [
    "winter-river/+/status",
  ]

  client_id = "telegraf-winter-river"
  qos = 0

  # Keep full topic as a tag for traceability
  topic_tag = "topic"

  # Extract node_id from topic path: winter-river/<node_id>/status
  # ESP32 JSON payloads do not include a node_id field — it lives in the topic.
  [[inputs.mqtt_consumer.topic_parsing]]
    topic = "winter-river/+/status"
    tags  = "_/node_id/_"

  # Parse JSON telemetry payloads.
  # The default JSON parser keeps non-numeric values (state, source, status,
  # ts) as string fields automatically, so no json_string_fields override is
  # needed. (Telegraf 1.38+ rejects that option on mqtt_consumer under strict
  # validation.)
  data_format = "json"
