# Grafana Configuration
# See: https://grafana.com/docs/grafana/latest/setup-grafana/configure-grafana/

[server]
# Protocol (http, https, h2, socket)
protocol = http
# Listen on all interfaces so hotspot clients can reach Grafana
http_addr = 0.0.0.0
http_port = 3000
domain = 192.168.4.1

[security]
# Set to true in production
# admin_user = admin
# admin_password = admin

[auth.anonymous]
# Enable anonymous access (disable in production)
enabled = false

[paths]
data = /var/lib/grafana
logs = /var/log/grafana
plugins = /var/lib/grafana/plugins

[database]
path = /var/lib/grafana/grafana.db

[dashboards]
# Versions to keep for each dashboard
versions_to_keep = 20
default_home_dashboard_path = /var/lib/grafana/dashboards/broker-overview.json

[users]
# Disable user signup
allow_sign_up = false

[log]
mode = console
level = info

# TODO: Customize additional settings as needed
# TODO: Configure SMTP for alerting (optional)
# TODO: Set up authentication provider if needed
