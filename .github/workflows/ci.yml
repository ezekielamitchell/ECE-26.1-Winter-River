name: CI

on:
  push:
    branches: [ main, ezekielamitchell ]
  pull_request:
    branches: [ main ]

jobs:
  python-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            broker/requirements.txt
            broker/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r broker/requirements.txt
          pip install -r broker/requirements-dev.txt

      # Advisory until the codebase is reformatted in a dedicated PR — surfaces
      # drift without blocking. Flip to a real failure once `black .` is clean.
      - name: Format check with black
        continue-on-error: true
        run: black --check --config broker/pyproject.toml broker/ tests/

      - name: Run tests
        run: pytest tests/ -v

  platformio-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/.cache
            ~/.platformio/platforms
            ~/.platformio/packages
          key: pio-${{ runner.os }}-${{ hashFiles('esp32-nodes/platformio.ini') }}
          restore-keys: |
            pio-${{ runner.os }}-

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      # Build one env per node category. Each `_a` env shares its build_src
      # with its `_b` sibling (same source under a different topic prefix),
      # so this catches firmware compile errors across the topology without
      # rebuilding 25 essentially-identical binaries on every PR.
      - name: Build ESP32 firmware (representative envs)
        working-directory: esp32-nodes
        run: |
          pio run \
            -e utility_a \
            -e mv_switchgear_a \
            -e mv_lv_transformer_a \
            -e generator_a \
            -e ats_a \
            -e lv_dist_a \
            -e ups_a \
            -e pdu_a \
            -e rectifier_a \
            -e cooling_a \
            -e lighting_a \
            -e server_rack
